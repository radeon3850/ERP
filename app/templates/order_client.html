{% extends "base.html" %}

{% block content %}

<style>
    .form1{
    display:inline-block;
    }
    .form2{
    display:inline-block;
    }
    .switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

.switch input {display:none;}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  -webkit-transition: .4s;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .slider {
  background-color: green;
}

input:focus + .slider {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .slider:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
}

/* Rounded sliders */
.slider.round {
  border-radius: 24px;
}

.slider.round:before {
  border-radius: 50%;
}
</style>

<script>
   function agreeForm(f) {
    // Если поставлен флажок, снимаем блокирование кнопки
    if (f.agree.checked) f.submit.disabled = 0
    // В противном случае вновь блокируем кнопку
    else f.submit.disabled = 1
   }
  </script>

<h5>{{order_client}}</h5>
    <div>
        <form action="" method="post">
             {{ form.hidden_tag() }}
            <div class="form1">
                <p>
                {{ form.checkbox.label}}
                    <span class="slieder round">{{ form.checkbox}}</span>
                </p>
            </div>
            <div class="form2">
                <h3>
                <span style="color: red;">
                    {{form.user_id.label}}<br>
                </span>
                </h3>
                <tr>
                    <p>{{form.user_id}}</p>
                </tr>
            </div>
            <p> {{form.save}}</p>
            </form>
<form>
<label class="switch">
  <input type="checkbox" name="agree" onclick="agreeForm(this.form)">

  <span class="slider round"></span>

</label>


<p><input type="checkbox" name="agree" onclick="agreeForm(this.form)">
Я согласен со всеми условиями</p>
<p><input type="submit" name="submit" value="Далее" disabled></p>
</form>

    </div>
{% endblock %}

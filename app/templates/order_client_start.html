{% extends "base.html" %}

{% block content %}

<style>
    .form1{
    display:inline-block;
    }
    .form2{
    display:inline-block;
    }
    .switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
    }

    /* Hide default HTML checkbox */
    .switch input {display:none;}

    /* The slider */
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      -webkit-transition: .4s;
      transition: .4s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      -webkit-transition: .4s;
      transition: .4s;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:focus + .slider {
      box-shadow: 0 0 1px #2196F3;
    }

    input:checked + .slider:before {
      -webkit-transform: translateX(26px);
      -ms-transform: translateX(26px);
      transform: translateX(26px);
    }

    /* Rounded sliders */
    .slider.round {
      border-radius: 34px;
    }

    .slider.round:before {
      border-radius: 50%;
    }
</style>


<h5>{{order_client}}</h5>
    <div>
        <form action="" method="post">
             {{ form.hidden_tag() }}
            <div class="form1">
                <p>
                {{ form.checkbox.label}}<br>
                {{ form.checkbox}}
                </p>
            </div>
            <div class="form2">
                <h3>
                <span style="color: red;">
                    {{form.user_id.label}}<br>
                </span>
                </h3>
                <tr>
                    <p>{{form.user_id}}</p>
                </tr>
            </div>
            <p> {{form.save}}</p>
            </form>
    </div>
{% endblock %}
